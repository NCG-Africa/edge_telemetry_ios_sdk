# .github/workflows/ci.yml
#
# Five-job continuous integration for the EdgeRum SDK.
#
# Triggers on every pull request, every push to main, and manual dispatch.
# Release-artifact builds live in release.yml and only fire on tag pushes.
#
#   build        — `swift build -c release` + `xcodebuild` against iOS device
#                  + simulator destinations.
#   test         — `swift test --enable-code-coverage`.
#   audit        — `Tools/check-supported-ios.sh` (iOS-floor consistency) +
#                  `Tools/firewall-check.sh` (Rule 1 — terminology firewall).
#   pod-lint     — `pod lib lint EdgeRum.podspec --allow-warnings`.
#   sample-build — `xcodebuild` matrix over the three sample apps under
#                  Samples/ (UIKit, SwiftUI, Crash). UIKit's .xcodeproj is
#                  regenerated from project.yml via XcodeGen each run.
#   docs         — `Tools/extract-readme-code.sh` (compile README + DocC
#                  snippets), `Tools/check-doc-coverage.sh` (every public
#                  symbol carries a /// comment), `Tools/check-links.sh`
#                  (lychee link check), DocC build with -warnings-as-errors.
#
# All jobs run on a macos-15 runner with the default Xcode 16 toolchain
# and auto-invoke Tools/fetch-plcrashreporter.sh so the .binaryTarget
# resolves before build.
#
# Per-task acceptance criteria mapped:
#   - T1.1 (#2)  — build job's swift build + xcodebuild step
#   - T1.3 (#4)  — test job's VersionPipelineTests
#   - T1.4 (#5)  — pod-lint job's `pod lib lint`
#   - T1.5 (#6)  — audit job (check-supported-ios.sh)
#   - T2.7       — audit job (firewall-check.sh)
#   - T1.2 (#3)  — XCFramework build lives in release.yml (tag-only)
#   - T7.3 (#56) — sample-build job (xcodebuild SwiftUI sample app)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: swift build (release)
    runs-on: macos-15
    # Backstop only — historical green runs finish in 3-5 min. A 30 min
    # ceiling caps a future hang (e.g. PLCR's Mach exception server
    # blocking under XCTest, which burned the full 6h GitHub default on
    # F18) at a cost we can absorb.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode (latest stable)
        # The macos-15 image rolled forward off Xcode 16 in mid-2026 — pinning
        # to Xcode_16.app left the runners falling through to whatever
        # default xcode-select pointed at. Use `latest-stable` so CI tracks
        # the runner image and we surface SDK-bump breakage as a CI signal
        # instead of letting it leak into pod-lint / sample-build only.
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
      - name: Fetch PLCrashReporter
        run: ./Tools/fetch-plcrashreporter.sh
      - name: swift build -c release
        run: swift build -c release
      - name: xcodebuild — iOS device
        run: |
          xcodebuild -scheme EdgeRum \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/dd-iphoneos \
            build | xcpretty || exit ${PIPESTATUS[0]}
      - name: xcodebuild — iOS Simulator
        run: |
          xcodebuild -scheme EdgeRum \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build/dd-iphonesimulator \
            build | xcpretty || exit ${PIPESTATUS[0]}

  test:
    name: swift test
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode (latest stable)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Fetch PLCrashReporter
        run: ./Tools/fetch-plcrashreporter.sh
      - name: swift test --enable-code-coverage
        run: swift test --enable-code-coverage

  audit:
    name: supported-iOS audit + terminology firewall
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode (latest stable)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Fetch PLCrashReporter
        # Needed so `swift package dump-symbol-graph` (run inside
        # firewall-check.sh) can resolve the PLCrashReporter binary
        # target before emitting EdgeRum's public symbol graph.
        run: ./Tools/fetch-plcrashreporter.sh
      - name: Run check-supported-ios.sh
        run: ./Tools/check-supported-ios.sh
      - name: Run firewall-check.sh (Rule 1 — terminology firewall)
        # Confirms no banned OpenTelemetry vocabulary leaked into the
        # public Swift symbol graph, public doc comments, README, or
        # consumer-facing markdown under docs/.
        run: ./Tools/firewall-check.sh

  pod-lint:
    name: pod lib lint
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode (latest stable)
        # CocoaPods invokes xcodebuild with `-destination id=<UDID>` that
        # it resolves from `xcrun simctl list`. The macos-15 runner ships
        # with multiple Xcode versions; pinning latest-stable guarantees
        # the simulator runtime CocoaPods enumerates is actually installed.
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: List available iOS Simulators
        # Surface what's available before the lint so destination-not-found
        # errors are diagnosable from the log alone.
        run: xcrun simctl list devices available | head -40
      - name: Fetch PLCrashReporter
        run: ./Tools/fetch-plcrashreporter.sh
      - name: Pre-generate version file
        # `pod lib lint` doesn't run the SwiftPM build plugin, so we
        # write the generated SemVer constant ahead of the lint.
        run: ./Tools/gen-version.sh Sources/EdgeRum/Generated/EdgeRumVersion.swift
      - name: pod lib lint
        # --verbose so destination-not-found failures show the actual
        # destination string CocoaPods chose.
        run: pod lib lint EdgeRum.podspec --allow-warnings --verbose

  sample-build:
    name: xcodebuild ${{ matrix.sample }} (iOS simulator)
    runs-on: macos-15
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - sample: EdgeRumSampleApp
            project: Samples/EdgeRumSampleApp/EdgeRumSampleApp.xcodeproj
            generates_project: true
          - sample: EdgeRumSwiftUISampleApp
            project: Samples/EdgeRumSwiftUISampleApp/EdgeRumSwiftUISampleApp.xcodeproj
            generates_project: false
          - sample: EdgeRumCrashSampleApp
            project: Samples/EdgeRumCrashSampleApp/EdgeRumCrashSampleApp.xcodeproj
            generates_project: true
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode (latest stable)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: List available iOS Simulators
        # Surface what's available before the build so destination-not-found
        # errors are diagnosable from the log alone.
        run: xcrun simctl list devices available | head -40
      - name: Install XcodeGen (UIKit sample only)
        # The UIKit sample's project is generated from project.yml via
        # XcodeGen; the other two samples ship hand-crafted .xcodeproj
        # files. Skip the brew step on those jobs to save runtime.
        if: matrix.generates_project
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
      - name: Generate UIKit sample .xcodeproj
        if: matrix.generates_project
        run: ./Tools/gen-sample-xcodeproj.sh
      - name: Fetch PLCrashReporter
        # The sample apps link against the local SwiftPM package at
        # ../.., so the same binary-target dependency the SDK needs has
        # to be in place before xcodebuild resolves the package graph.
        run: ./Tools/fetch-plcrashreporter.sh
      - name: xcodebuild — ${{ matrix.sample }}
        # Generic-simulator destination keeps us off concrete iOS
        # runtime IDs the macos-15 image may or may not ship with.
        # Code signing is force-disabled because we never install the
        # built .app on a device from CI.
        run: |
          set -o pipefail
          xcodebuild \
            -project '${{ matrix.project }}' \
            -scheme '${{ matrix.sample }}' \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build/dd-sample-${{ matrix.sample }} \
            -skipPackagePluginValidation \
            CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            build | xcpretty || exit ${PIPESTATUS[0]}

  docs:
    name: doc-quality (README snippets, DocC, link & coverage checks)
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode (latest stable)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
      - name: Fetch PLCrashReporter
        # `swift build` and `swift package dump-symbol-graph` both need
        # the binary target resolved before the package graph evaluates.
        run: ./Tools/fetch-plcrashreporter.sh
      - name: swift build (modules required by snippet parse)
        # extract-readme-code.sh re-builds EdgeRum to produce .swiftmodule
        # files for the snippet parse step. Pre-warming the cache here
        # makes the next step run incrementally instead of from scratch.
        run: swift build --product EdgeRum
      - name: Compile README + DocC snippets
        run: ./Tools/extract-readme-code.sh
      - name: Doc-coverage (every public symbol has a /// block)
        run: ./Tools/check-doc-coverage.sh
      - name: Build DocC catalog (warnings as errors)
        # The swift-docc-plugin dependency in Package.swift exposes the
        # `generate-documentation` subcommand. `--warnings-as-errors`
        # is what turns a malformed Topics list, a missing Recipe link,
        # or an undocumented public symbol into a CI failure.
        run: |
          set -o pipefail
          swift package \
            --allow-writing-to-directory build/docc \
            generate-documentation \
            --target EdgeRum \
            --output-path build/docc \
            --disable-indexing \
            --warnings-as-errors | xcpretty || exit ${PIPESTATUS[0]}
      - name: Install lychee + check links
        # check-links.sh self-installs lychee via brew on macOS runners
        # so this step is just the invocation.
        run: ./Tools/check-links.sh
